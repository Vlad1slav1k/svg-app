<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>
<body>

<img id="slide" src="/1.svg">

<script>
  const images = ["/1.svg", "/2.svg", "/3.svg", "/4.svg"];
  let i = 0;

  setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById("slide").src = images[i];
  }, 5000);
</script>

</body>
</html>
