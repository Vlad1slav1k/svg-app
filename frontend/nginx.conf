events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        # ✅ API
        location /api/ {
            proxy_pass http://backend:8000/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # ✅ static files
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
