name: Deploy My App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u vlad1slav1k --password-stdin

      - name: Set lowercase repo name
        run: echo "REPO=$(echo $GITHUB_REPOSITORY_OWNER | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build backend
        run: docker build -t ghcr.io/vlad1slav1k/svg-app-backend:latest ./backend

      - name: Push backend
        run: docker push ghcr.io/vlad1slav1k/svg-app-backend:latest

      - name: Build frontend
        run: docker build -t ghcr.io/vlad1slav1k/svg-app-frontend:latest ./frontend

      - name: Push frontend
        run: docker push ghcr.io/vlad1slav1k/svg-app-frontend:latest


      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Install Helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy
        run: helm upgrade --install my-app ./helm-app
