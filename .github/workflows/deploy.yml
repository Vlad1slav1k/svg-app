name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  # =========================
  # ✅ CI JOB (BUILD + PUSH)
  # =========================
  ci:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Login to GHCR using PAT
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u vlad1slav1k --password-stdin

      # ✅ Generate version (commit SHA)
      - name: Set version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ✅ Build & push backend
      - name: Build & Push backend
        run: |
          docker build -t ghcr.io/vlad1slav1k/svg-app-backend:${{ env.VERSION }} ./backend
          docker push ghcr.io/vlad1slav1k/svg-app-backend:${{ env.VERSION }}

      # ✅ Build & push frontend
      - name: Build & Push frontend
        run: |
          docker build -t ghcr.io/vlad1slav1k/svg-app-frontend:${{ env.VERSION }} ./frontend
          docker push ghcr.io/vlad1slav1k/svg-app-frontend:${{ env.VERSION }}


  # =========================
  # ✅ CD JOB (UPDATE HELM)
  # =========================
  cd:
    name: Update Helm values
    needs: ci   # ✅ runs only if CI succeeds
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Same version as CI
      - name: Set version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ✅ Update backend tag
      - name: Update backend image tag
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.backend.image.tag = strenv(VERSION)' helm-app/values.yaml

      # ✅ Update frontend tag
      - name: Update frontend image tag
        uses: mikefarah/yq@v4
        with:
          cmd: yq -i '.frontend.image.tag = strenv(VERSION)' helm-app/values.yaml

      # ✅ Commit changes back to repo
      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add helm-app/values.yaml
          git commit -m "update image tag $VERSION" || echo "No changes"
          git push
